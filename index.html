<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>你是《水浒传》中的哪位好汉？</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <!-- 首页 -->
      <section id="homeView" class="view is-active" aria-labelledby="homeTitle">
        <div class="section-inner intro-layout">
          <p class="eyebrow">水浒人格测试</p>
          <h1 id="homeTitle">你是《水浒传》中的哪位好汉？</h1>
          <p class="intro-text">测测你在梁山泊更像哪位好汉，看看你的性格底色。</p>
          <button id="startButton" class="primary-button" type="button">开始测试</button>
        </div>
      </section>

      <!-- 答题页 -->
      <section id="quizView" class="view" aria-labelledby="quizTitle">
        <div class="section-inner quiz-layout">
          <div class="progress-row">
            <p id="questionProgress" class="progress-text">第 1 / 60 题</p>
            <div class="progress-track" aria-hidden="true">
              <div id="progressBar" class="progress-bar"></div>
            </div>
          </div>
          <h2 id="quizTitle"></h2>
          <p id="questionText" class="question-text"></p>
          <div id="optionsList" class="options-list"></div>
          <p id="answerHint" class="answer-hint" role="status" aria-live="polite"></p>
          <div class="button-row">
            <button id="prevButton" class="secondary-button" type="button">上一题</button>
            <button id="submitButton" class="primary-button" type="button" style="display:none">提交</button>
          </div>
        </div>
      </section>

      <!-- 计算页 -->
      <section id="calculatingView" class="view" aria-labelledby="calculatingTitle">
        <div class="section-inner center-layout">
          <p class="eyebrow">正在聚义排座</p>
          <h2 id="calculatingTitle">正在根据你的选择匹配梁山好汉</h2>
          <div class="calculating-animation"></div>
        </div>
      </section>

      <!-- 结果页 -->
      <section id="resultView" class="view" aria-labelledby="resultTitle">
        <div class="section-inner result-layout">
          <p class="eyebrow">测试结果</p>

          <!-- 主匹配人物 -->
          <div id="primaryResult" class="result-block">
            <h2 id="resultTitle">这里会展示你的主匹配人物</h2>
            <p class="result-subtitle">结果生成中...</p>
          </div>

          <!-- 经典语录 -->
          <div id="quoteBlock" class="result-block">
            <h3>经典语录</h3>
            <p class="classical-quote">...</p>
          </div>

          <!-- 人物解读 -->
          <div id="resultDescription" class="result-block">
            <h3>人物解读</h3>
            <div class="description-list"></div>
          </div>

          <!-- 优势与盲点 -->
          <div id="resultStrengths" class="result-block">
            <h3>优势</h3>
            <div class="result-columns">
              <div>
                <h4>你的优势</h4>
                <ul class="plain-list"></ul>
              </div>
              <div>
                <h4>需要注意的盲点</h4>
                <ul class="plain-list"></ul>
              </div>
            </div>
          </div>

          <!-- 团队角色与适合位置 -->
          <div id="resultRole" class="result-block">
            <h3>适合位置与团队角色</h3>
            <p class="best-role-text"></p>
            <p class="team-role"></p>
          </div>

          <!-- 成长建议 -->
          <div id="growthAdvice" class="result-block">
            <h3>成长建议</h3>
            <ul class="growth-advice"></ul>
          </div>

          <!-- 人生启示 -->
          <div id="lifeInsight" class="result-block">
            <h3>人生启示</h3>
            <p class="life-insight"></p>
          </div>

          <!-- 雷达图 -->
          <div id="scoreSummary" class="result-block">
            <h3>十维倾向</h3>
            <div id="radarChartContainer">
              <canvas id="radarChart" width="400" height="400"></canvas>
            </div>
            <div class="score-list"></div>
          </div>

          <!-- 相关人物 -->
          <div id="relatedCharacters" class="result-block">
            <h3>相近·互补·对立人物</h3>
            <div class="related-grid"></div>
          </div>

          <div class="button-row">
            <button id="restartButton" class="secondary-button" type="button">重新测试</button>
            <button id="copyResultButton" class="primary-button" type="button">复制结果</button>
          </div>
          <p id="copyStatus" class="copy-status" role="status" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="results.js"></script>
    <script src="scoring.js"></script>
    <script src="app.js"></script>
  </body>
</html>
